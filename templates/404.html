{% extends "base.html" %}
{% load i18n %}

{% block title %}404 - {% translate "Not Found" %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <h1 class="display-1 fw-bold text-secondary">404</h1>
        <h2 class="mb-3">{% translate "Page Not Found" %}</h2>
        <p class="text-muted mb-4">{% translate "The page you are looking for does not exist or has been moved." %}</p>
        <a href="{% url 'index' %}" class="btn btn-primary">
            <i class="bi bi-house me-2"></i>{% translate "Back to Home" %}
        </a>
    </div>
</div>
{% endblock %}
