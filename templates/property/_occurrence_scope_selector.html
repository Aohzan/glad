{% load i18n %}
<div class="card {{ card_mb|default:'mb-3' }}">
  <div class="card-header py-2">
    <h6 class="mb-0"><i class="bi bi-sliders me-1"></i>{{ card_title }}</h6>
  </div>
  <div class="card-body">
    <div class="d-flex flex-column gap-2">
      <div class="form-check">
        <input class="form-check-input" type="radio" name="scope" id="scope-this"
               value="{{ scope_this }}" checked>
        <label class="form-check-label" for="scope-this">
          <strong>{% translate "This occurrence only" %}</strong>
          <div class="text-body-secondary small">{{ desc_this }}</div>
        </label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="scope" id="scope-future"
               value="{{ scope_future }}">
        <label class="form-check-label" for="scope-future">
          <strong>{% translate "This and future occurrences" %}</strong>
          <div class="text-body-secondary small">{{ desc_future }}</div>
        </label>
      </div>
      <div class="form-check">
        <input class="form-check-input" type="radio" name="scope" id="scope-all"
               value="{{ scope_all }}">
        <label class="form-check-label" for="scope-all">
          <strong>{% translate "All occurrences" %}</strong>
          <div class="text-body-secondary small {% if all_desc_class %}{{ all_desc_class }}{% endif %}">{{ desc_all }}</div>
        </label>
      </div>
    </div>
  </div>
</div>
