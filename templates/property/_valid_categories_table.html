{% load i18n %}
<table class="{{ table_class }}">
  <thead class="table-light">
    <tr>
      <th>{{ value_header }}</th>
      <th>{% translate 'Label' %}</th>
    </tr>
  </thead>
  <tbody>
    {% for value, label in valid_categories %}
      <tr>
        <td><code>{{ value }}</code></td>
        <td>{{ label }}</td>
      </tr>
    {% endfor %}
  </tbody>
</table>
