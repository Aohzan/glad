{% load i18n %}
<div class="card mb-4">
  <div class="card-header py-2">
    <h6 class="mb-0"><i class="bi bi-sticky me-1"></i>{% translate "Notes" %}</h6>
  </div>
  <div class="card-body">
    <label for="{{ form.notes.id_for_label }}" class="form-label">
      {% translate "Notes" %}
      <span class="text-body-secondary fw-normal small ms-1">({% translate "optional" %})</span>
    </label>
    {{ form.notes }}
    {% if form.notes.errors %}<div class="invalid-feedback d-block">{{ form.notes.errors }}</div>{% endif %}
  </div>
</div>
