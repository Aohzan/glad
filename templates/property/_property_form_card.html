{% load i18n %}
<form method="post" novalidate>
  {% csrf_token %}

  <div class="card mb-4">
    <div class="card-header">
      <h5 class="mb-0">{% translate "Property Details" %}</h5>
    </div>
    <div class="card-body">
      {% include "property/_property_form_fields.html" %}
    </div>
  </div>

  <div class="d-flex gap-2 justify-content-end">
    <a href="{{ cancel_url }}" class="btn btn-secondary">
      {% translate "Cancel" %}
    </a>
    <button type="submit" class="btn btn-primary">
      <i class="bi {{ submit_icon_class }} me-1"></i> {{ submit_label }}
    </button>
  </div>
</form>
