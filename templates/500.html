{% load i18n static %}
<!DOCTYPE html>
<html data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>500 - {% translate "Server Error" %} - Glad</title>
    <link rel="stylesheet" href="{% static 'vendors/bootstrap/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'vendors/bootstrap-icons/font/bootstrap-icons.css' %}">
    <link rel="stylesheet" href="{% static 'site.css' %}">
</head>
<body>
    <main>
        <div class="container">
            <div class="row justify-content-center mt-5">
                <div class="col-md-6 text-center">
                    <h1 class="display-1 fw-bold text-danger">500</h1>
                    <h2 class="mb-3">{% translate "Server Error" %}</h2>
                    <p class="text-muted mb-4">{% translate "An unexpected error occurred. Please try again later." %}</p>
                    <a href="/" class="btn btn-primary">
                        <i class="bi bi-house me-2"></i>{% translate "Back to Home" %}
                    </a>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
