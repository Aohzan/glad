{% load i18n %}
<div class="col-md-3">
  <small class="text-body-secondary">{% translate "Type" %}</small>
  <div>{{ account.account_type }}</div>
</div>
{% if account.owner %}
<div class="col-md-3">
  <small class="text-body-secondary">{% translate "Owner" %}</small>
  <div>{{ account.owner }}</div>
</div>
{% endif %}
{% if account.institution %}
<div class="col-md-3">
  <small class="text-body-secondary">{% translate "Institution" %}</small>
  <div>{{ account.institution }}</div>
</div>
{% endif %}
