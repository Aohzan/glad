<div class="col-md-3">
  <small class="text-body-secondary">{% translate "Status" %}</small>
  <div>
    {% if account.is_active %}

      <span class="badge bg-secondary">{% translate "Closed" %}</span>
    {% endif %}
  </div>
</div>
