{% load i18n %}
{% include "finance/_form_error_alert.html" %}

<form method="post">
  {% csrf_token %}

  <div class="card mb-3">
    <div class="card-header py-2">
      <h6 class="mb-0"><i class="bi bi-cash-stack me-1"></i>{% translate "Deposit" %}</h6>
    </div>
    <div class="card-body">
      <div class="row g-3">
        {% include "finance/_edit_deposit_fields.html" %}
        <div class="col-md-6 d-flex align-items-end">
          <div class="form-check mb-2">
            {{ update_account_field }}
            <label class="form-check-label" for="{{ update_account_field.id_for_label }}">
              {{ update_account_label }}
            </label>
          </div>
        </div>
      </div>
    </div>
  </div>

  {% include "finance/_edit_form_footer.html" with cancel_url=cancel_url %}
</form>
