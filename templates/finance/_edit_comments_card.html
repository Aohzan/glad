{% load i18n %}
{# ── Comments ──────────────────────────────────────────────────────────────── #}
<div class="card mb-3">
  <div class="card-header py-2">
    <h6 class="mb-0"><i class="bi bi-chat-text me-1"></i>{% translate "Comments" %}</h6>
  </div>
  <div class="card-body">
    {{ form.commentaire }}
    {% if form.commentaire.errors %}<div class="invalid-feedback d-block">{{ form.commentaire.errors }}</div>{% endif %}
  </div>
</div>
