{% extends "base.html" %}
{% load i18n %}

{% block title %}403 - {% translate "Forbidden" %}{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <h1 class="display-1 fw-bold text-warning">403</h1>
        <h2 class="mb-3">{% translate "Access Forbidden" %}</h2>
        <p class="text-muted mb-4">{% translate "You do not have permission to access this page." %}</p>
        <a href="{% url 'index' %}" class="btn btn-primary">
            <i class="bi bi-house me-2"></i>{% translate "Back to Home" %}
        </a>
    </div>
</div>
{% endblock %}
